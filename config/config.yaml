# snpArcher v2 Configuration Example

samples: "/n/home08/dwhite/cocawgs-snparcher/config/samplesheet_cocawgs-2026-v1-s46.csv"

# Optional: per-sample metadata for modules (exclude, outgroup, lat, long, etc.)
# sample_metadata: "config/sample_metadata.csv"

reference:
  name: "ENN-GCA_029891385.1"
  source: "GCA_029891385.1"  # Can be a refseq/genbank accession, url, or path

variant_calling:
  expected_coverage: "low"  # low | high | auto (future)
  tool: "gatk" # gatk | sentieon | bcftools | deepvariant | parabricks
  ploidy: 2
  gatk:
    het_prior: 0.005
  sentieon:
    license: ""
  bcftools:
    min_mapq: 20
    min_baseq: 20
    max_depth: 250
  deepvariant:
    model_type: "WGS"
    num_shards: 8
  parabricks:
    container_image: ""  # Required if tool == "parabricks"
    num_gpus: 1
    num_cpu_threads: 16
    extra_args: ""

intervals:
  enabled: true
  min_nmer: 500
  num_gvcf_intervals: 50
  db_scatter_factor: 0.15


callable_sites:
  generate_bed_file: True
  coverage:
    enabled: true
    fraction: 1.0
    min_coverage: auto
    max_coverage: auto
    merge_distance: 100
  mappability:
    enabled: true
    min_score: 1
    kmer: 150
    merge_distance: 100

modules:
  qc:
    enabled: false
    clusters: 3
    min_depth: 1
    google_api_key: ""
    exclude_scaffolds: ""
  postprocess:
    enabled: false
    filtering:
      contig_size: 10000
      maf: 0.01
      missingness: 0.75
      exclude_scaffolds: "mtDNA,Y"
  trackhub:
    enabled: false
    email: "example@email.com"
  mk:
    enabled: false
    gff: ""  # path to GFF annotation file (required when mk is enabled)
